<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />

		<!-- Favicons -->
		<link rel="icon" href="/favicon.ico" sizes="any" />
		<link rel="icon" type="image/svg+xml" href="/icon.svg" />
		<link rel="icon" type="image/png" sizes="32x32" href="/favicon.png" />
		<link rel="mask-icon" href="/icon.svg" color="#7287fd" />

		<!-- iOS home-screen / PWA -->
		<link rel="manifest" href="/manifest.webmanifest" />
		<link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
		<meta name="apple-mobile-web-app-capable" content="yes" />
		<meta name="mobile-web-app-capable" content="yes" />
		<meta name="apple-mobile-web-app-status-bar-style" content="default" />
		<meta name="apple-mobile-web-app-title" content="Manabi" />

		<!-- Browser/status-bar tint (follows system light/dark) -->
		<meta name="theme-color" media="(prefers-color-scheme: light)" content="#f5f5f5" />
		<meta name="theme-color" media="(prefers-color-scheme: dark)" content="#1e1e2e" />
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
