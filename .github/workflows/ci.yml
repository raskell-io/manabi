name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Svelte check (0 errors, 0 warnings)
        run: npm run check

      - name: Unit tests
        run: npm test

      - name: Production build
        run: npm run build
