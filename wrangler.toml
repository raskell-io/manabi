# Cloudflare deploy config — Manabi is a static SPA served via Workers Static
# Assets (the "Workers & Pages" build runs `npm run build` then `npx wrangler
# deploy`). There is no Worker script: `assets.directory` points at the
# adapter-static output and Cloudflare serves it directly.
#
# SPA routing: the build emits `index.html` as the shell (svelte.config
# `fallback: 'index.html'`); `single-page-application` serves it with a 200 for
# any path that isn't a real asset. (NB: classic-Pages `_redirects` 200-rewrites
# are NOT honored here — they turn into a 307 redirect loop.)

name = "manabi"
compatibility_date = "2025-06-01"

[assets]
directory = "./build"
not_found_handling = "single-page-application"
